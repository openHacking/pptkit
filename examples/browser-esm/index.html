<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPTKit Browser ESM Example</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      body { margin: 0; background: #f4f7fb; color: #172033; }
      main { width: min(1080px, calc(100% - 32px)); margin: 40px auto; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
      h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 48px); }
      p { color: #5b6578; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; }
      button { border: 0; border-radius: 999px; padding: 12px 18px; background: #2457d6; color: white; font: inherit; font-weight: 700; cursor: pointer; }
      button.secondary { background: #172033; }
      button:disabled { cursor: wait; opacity: 0.6; }
      #status { min-height: 24px; font-weight: 650; }
      #warnings { min-height: 24px; color: #9a4d00; white-space: pre-wrap; }
      #preview { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 28px; }
      .slide { overflow: hidden; border: 1px solid #dce3ef; border-radius: 16px; background: white; box-shadow: 0 16px 40px rgb(23 32 51 / 10%); }
      .slide svg { display: block; width: 100%; height: auto; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@pptkit/core": "https://cdn.jsdelivr.net/npm/@pptkit/core@latest/dist/browser/index.js",
          "@pptkit/layout": "https://cdn.jsdelivr.net/npm/@pptkit/layout@latest/dist/browser/index.js",
          "@pptkit/pptx-exporter": "https://cdn.jsdelivr.net/npm/@pptkit/pptx-exporter@latest/dist/browser/index.js",
          "@pptkit/svg-renderer": "https://cdn.jsdelivr.net/npm/@pptkit/svg-renderer@latest/dist/browser/index.js"
        }
      }
    </script>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>PPTKit in the browser</h1>
          <p>Create, preview, and download a two-slide PPTX without a Node.js runtime.</p>
        </div>
        <div class="actions">
          <button id="preview-button" class="secondary" type="button">Preview SVG</button>
          <button id="download-button" type="button">Download PPTX</button>
        </div>
      </header>
      <p id="status" role="status">Ready.</p>
      <pre id="warnings" aria-live="polite"></pre>
      <section id="preview" aria-label="Slide previews"></section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
