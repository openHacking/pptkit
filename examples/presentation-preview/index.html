<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>PPTKit Presentation Preview</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div>
          <h1 id="deck-title">PPTKit Preview</h1>
        </div>
        <div class="topbar-actions">
          <button id="download" type="button" disabled>Generate &amp; download PPTX</button>
        </div>
      </header>

      <section id="transfer-panel" class="transfer-panel" aria-labelledby="transfer-heading">
        <div>
          <h2 id="transfer-heading">Load Your Presentation</h2>
          <p>Your presentation will load here. Just a moment...</p>
        </div>
        <textarea id="transfer-input" data-testid="pptkit-transfer-input" spellcheck="false" aria-label="Load presentation" placeholder="Loading your presentation..."></textarea>
        <div class="transfer-actions">
          <button id="transfer-submit" data-testid="pptkit-transfer-submit" type="button">Load</button>
        </div>
        <p id="transfer-error" class="error" role="alert"></p>
        <div id="transfer-progress" class="transfer-progress" aria-live="polite"><p>Waiting for your presentation...</p></div>
      </section>

      <section class="statusbar" aria-live="polite">
        <span id="status">Loading your presentation...</span>
        <span id="deck-meta"></span>
      </section>

      <main class="workspace">
        <aside class="filmstrip" aria-label="Slide thumbnails">
          <div id="thumbnails"></div>
        </aside>
        <section class="stage-panel" aria-label="Current slide">
          <div id="stage" class="stage"><p>Your slides will appear here.</p></div>
          <div class="stage-controls">
            <button id="previous" type="button" class="secondary" disabled>Previous</button>
            <span id="page-status">0 / 0</span>
            <button id="next" type="button" class="secondary" disabled>Next</button>
          </div>
          <p class="fidelity-note">Browser preview. Appearance may vary slightly in PowerPoint.</p>
        </section>
        <aside class="issues-panel" aria-labelledby="issues-heading">
          <h2 id="issues-heading">Review findings</h2>
          <div id="issues"><p>No deck loaded.</p></div>
        </aside>
      </main>
    </div>
  </body>
</html>
