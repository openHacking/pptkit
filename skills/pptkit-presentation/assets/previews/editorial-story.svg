<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Editorial Story theme preview</title>
  <desc id="desc">Three representative slides showing serif narrative typography, a pull quote, and an editorial ledger.</desc>
  <rect width="1200" height="675" fill="#EFE8DD"/>
  <text x="56" y="54" font-family="Arial" font-size="14" font-weight="700" letter-spacing="2" fill="#A33C2E">EDITORIAL STORY</text>
  <text x="1144" y="54" text-anchor="end" font-family="Arial" font-size="13" fill="#766A5E">NARRATIVE · WARM · CONSIDERED</text>
  <g transform="translate(56 86)">
    <rect width="336" height="492" rx="4" fill="#FBF7F0" stroke="#D9CFC1"/>
    <rect x="214" width="122" height="492" fill="#FFFDFC"/>
    <rect x="28" y="34" width="26" height="4" fill="#A33C2E"/>
    <text x="64" y="42" font-family="Arial" font-size="8" font-weight="700" fill="#766A5E">EDITORIAL STORY</text>
    <text x="28" y="156" font-family="Georgia" font-size="27" fill="#2B2118">Ideas deserve</text>
    <text x="28" y="190" font-family="Georgia" font-size="27" fill="#2B2118">room to</text>
    <text x="28" y="224" font-family="Georgia" font-size="27" fill="#2B2118">unfold.</text>
    <text x="30" y="268" font-family="Arial" font-size="11" fill="#766A5E">Narrow measure. Deliberate pace.</text>
    <text x="238" y="166" font-family="Georgia" font-size="15" fill="#2B2118">A considered</text>
    <text x="238" y="188" font-family="Georgia" font-size="15" fill="#2B2118">narrative for</text>
    <text x="238" y="210" font-family="Georgia" font-size="15" fill="#2B2118">focused rooms.</text>
    <line x1="238" y1="254" x2="306" y2="254" stroke="#A33C2E" stroke-width="2"/>
  </g>
  <g transform="translate(432 86)">
    <rect width="336" height="492" rx="4" fill="#FBF7F0" stroke="#D9CFC1"/>
    <rect x="28" y="28" width="20" height="4" fill="#A33C2E"/>
    <text x="60" y="36" font-family="Arial" font-size="8" font-weight="700" fill="#766A5E">STATEMENT</text>
    <text x="308" y="36" text-anchor="end" font-family="Arial" font-size="9" fill="#766A5E">03</text>
    <line x1="28" y1="50" x2="308" y2="50" stroke="#2B2118" opacity=".14"/>
    <text x="28" y="142" font-family="Georgia" font-size="62" fill="#A33C2E">“</text>
    <text x="72" y="174" font-family="Georgia" font-size="28" fill="#2B2118">The strongest</text>
    <text x="72" y="208" font-family="Georgia" font-size="28" fill="#2B2118">story is a clear</text>
    <text x="72" y="242" font-family="Georgia" font-size="28" fill="#2B2118">point of view.</text>
    <line x1="72" y1="282" x2="210" y2="282" stroke="#A33C2E" stroke-width="2"/>
    <text x="72" y="316" font-family="Arial" font-size="12" fill="#766A5E">Evidence supports the argument;</text>
    <text x="72" y="336" font-family="Arial" font-size="12" fill="#766A5E">it never competes with it.</text>
  </g>
  <g transform="translate(808 86)">
    <rect width="336" height="492" rx="4" fill="#FBF7F0" stroke="#D9CFC1"/>
    <rect x="28" y="28" width="20" height="4" fill="#A33C2E"/>
    <text x="60" y="36" font-family="Arial" font-size="8" font-weight="700" fill="#766A5E">FIELD NOTES</text>
    <text x="308" y="36" text-anchor="end" font-family="Arial" font-size="9" fill="#766A5E">05</text>
    <line x1="28" y1="50" x2="308" y2="50" stroke="#2B2118" opacity=".14"/>
    <text x="28" y="90" font-family="Georgia" font-size="20" fill="#2B2118">Signals worth following</text>
    <text x="28" y="132" font-family="Arial" font-size="8" font-weight="700" fill="#A33C2E">SIGNAL</text>
    <text x="172" y="132" font-family="Arial" font-size="8" font-weight="700" fill="#A33C2E">WHY IT MATTERS</text>
    <line x1="28" y1="146" x2="308" y2="146" stroke="#A33C2E" stroke-width="2"/>
    <text x="28" y="180" font-family="Georgia" font-size="12" fill="#2B2118">Earlier exposure</text>
    <text x="172" y="180" font-family="Arial" font-size="10" fill="#766A5E">Attention compounds.</text>
    <line x1="28" y1="202" x2="308" y2="202" stroke="#2B2118" opacity=".12"/>
    <text x="28" y="236" font-family="Georgia" font-size="12" fill="#2B2118">Persistent search</text>
    <text x="172" y="236" font-family="Arial" font-size="10" fill="#766A5E">Discovery continues.</text>
    <line x1="28" y1="258" x2="308" y2="258" stroke="#2B2118" opacity=".12"/>
    <text x="28" y="292" font-family="Georgia" font-size="12" fill="#2B2118">Focused curation</text>
    <text x="172" y="292" font-family="Arial" font-size="10" fill="#766A5E">Choice becomes easier.</text>
    <line x1="28" y1="314" x2="308" y2="314" stroke="#2B2118" opacity=".12"/>
  </g>
  <text x="56" y="626" font-family="Arial" font-size="14" fill="#766A5E">Serif display type · narrow measures · pull quotes · tonal editorial surfaces</text>
</svg>
