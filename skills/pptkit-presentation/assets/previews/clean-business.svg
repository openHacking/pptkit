  <text x="68" y="636" font-family="Arial" font-size="13" fill="#647083">STRONG HIERARCHY · RESTRAINED ACCENTS · OPEN, EDITABLE STRUCTURE</text>
  <text x="1132" y="636" text-anchor="end" font-family="Arial" font-size="13" font-weight="700" fill="#2457D6">05 / 12</text>
