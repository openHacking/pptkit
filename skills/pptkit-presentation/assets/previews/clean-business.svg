<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Clean Business theme preview</title>
  <desc id="desc">Three representative slides showing an executive cover, a divided argument, and a data ledger.</desc>
  <rect width="1200" height="675" fill="#EEF2F7"/>
  <text x="56" y="54" font-family="Arial" font-size="14" font-weight="700" letter-spacing="2" fill="#2457D6">CLEAN BUSINESS</text>
  <text x="1144" y="54" text-anchor="end" font-family="Arial" font-size="13" fill="#647083">COVER · ARGUMENT · DATA</text>
  <g transform="translate(56 86)">
    <rect width="336" height="492" rx="8" fill="#F7F8FA" stroke="#D6DEE9"/>
    <rect width="7" height="492" fill="#2457D6"/>
    <text x="34" y="48" font-family="Arial" font-size="9" font-weight="700" fill="#2457D6">PPTKIT</text>
    <line x1="34" y1="62" x2="310" y2="62" stroke="#172033" opacity=".15"/>
    <text x="34" y="162" font-family="Arial" font-size="34" font-weight="700" fill="#172033">Clarity moves</text>
    <text x="34" y="202" font-family="Arial" font-size="34" font-weight="700" fill="#172033">decisions.</text>
    <text x="34" y="248" font-family="Arial" font-size="14" fill="#647083">Clear hierarchy. Focused evidence.</text>
    <rect x="258" y="128" width="52" height="178" fill="#2457D6"/>
    <text x="270" y="166" font-family="Arial" font-size="25" font-weight="700" fill="#FFF">01</text>
    <text x="270" y="242" font-family="Arial" font-size="8" font-weight="700" fill="#FFF">CLEAR</text>
    <text x="270" y="257" font-family="Arial" font-size="8" font-weight="700" fill="#FFF">FOCUSED</text>
    <text x="270" y="272" font-family="Arial" font-size="8" font-weight="700" fill="#FFF">EDITABLE</text>
  </g>
  <g transform="translate(432 86)">
    <rect width="336" height="492" rx="8" fill="#F7F8FA" stroke="#D6DEE9"/>
    <text x="28" y="34" font-family="Arial" font-size="8" font-weight="700" fill="#2457D6">STATEMENT</text>
    <text x="308" y="34" text-anchor="end" font-family="Arial" font-size="9" fill="#647083">03</text>
    <line x1="28" y1="48" x2="308" y2="48" stroke="#172033" opacity=".15"/>
    <text x="28" y="90" font-family="Arial" font-size="20" font-weight="700" fill="#172033">One operating model.</text>
    <text x="28" y="168" font-family="Arial" font-size="20" font-weight="700" fill="#172033">Structure turns</text>
    <text x="28" y="195" font-family="Arial" font-size="20" font-weight="700" fill="#172033">evidence into</text>
    <text x="28" y="222" font-family="Arial" font-size="20" font-weight="700" fill="#172033">action.</text>
    <line x1="214" y1="134" x2="214" y2="382" stroke="#2457D6" stroke-width="2"/>
    <text x="232" y="168" font-family="Arial" font-size="10" fill="#647083">• Name the decision</text>
    <text x="232" y="202" font-family="Arial" font-size="10" fill="#647083">• Show evidence</text>
    <text x="232" y="236" font-family="Arial" font-size="10" fill="#647083">• Clarify ownership</text>
  </g>
  <g transform="translate(808 86)">
    <rect width="336" height="492" rx="8" fill="#F7F8FA" stroke="#D6DEE9"/>
    <text x="28" y="34" font-family="Arial" font-size="8" font-weight="700" fill="#2457D6">PERFORMANCE</text>
    <text x="308" y="34" text-anchor="end" font-family="Arial" font-size="9" fill="#647083">05</text>
    <line x1="28" y1="48" x2="308" y2="48" stroke="#172033" opacity=".15"/>
    <text x="28" y="90" font-family="Arial" font-size="20" font-weight="700" fill="#172033">Momentum compounds</text>
    <line x1="28" y1="122" x2="308" y2="122" stroke="#2457D6" stroke-width="2"/>
    <text x="28" y="152" font-family="Arial" font-size="10" font-weight="700" fill="#172033">Activation</text>
    <text x="212" y="152" font-family="Arial" font-size="10" fill="#647083">+18% quarter over quarter</text>
    <line x1="28" y1="174" x2="308" y2="174" stroke="#172033" opacity=".12"/>
    <text x="28" y="204" font-family="Arial" font-size="10" font-weight="700" fill="#172033">Retention</text>
    <text x="212" y="204" font-family="Arial" font-size="10" fill="#647083">72% active teams</text>
    <line x1="28" y1="226" x2="308" y2="226" stroke="#172033" opacity=".12"/>
    <text x="28" y="256" font-family="Arial" font-size="10" font-weight="700" fill="#172033">Velocity</text>
    <text x="212" y="256" font-family="Arial" font-size="10" fill="#647083">3.4× delivery rate</text>
    <line x1="28" y1="278" x2="308" y2="278" stroke="#172033" opacity=".12"/>
  </g>
  <text x="56" y="626" font-family="Arial" font-size="14" fill="#647083">Strong information axes · restrained accents · open, editable structure</text>
</svg>
