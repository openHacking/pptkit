name: Deploy presentation preview

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-presentation-preview.yml"
      - "examples/presentation-preview/**"
      - "packages/core/**"
      - "packages/layout/**"
      - "packages/pptx-exporter/**"
      - "packages/presentation-workflow/**"
      - "packages/svg-renderer/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build presentation preview
        run: >-
          pnpm --filter @pptkit/core
          --filter @pptkit/layout
          --filter @pptkit/pptx-exporter
          --filter @pptkit/presentation-workflow
          --filter @pptkit/svg-renderer
          build

      - name: Build presentation preview app
        run: pnpm --filter @pptkit/presentation-preview build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/presentation-preview/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
